<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ATITUS Reservas</title>
  <link rel="stylesheet" href="login.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="split">
    <div class="split-left">
      <div class="brand">
        <i class="bi bi-mortarboard-fill"></i>
        <div>
          <div class="brand-name">BOOKING</div>
          <div class="brand-sub">System</div>
        </div>
      </div>
      <div class="hero-text">
        <h1>Reserve seu<br/>espaço com<br/><em>facilidade.</em></h1>
        <p>Laboratórios e salas disponíveis para você a qualquer momento.</p>
      </div>
      <div class="hero-cards">
        <div class="hcard"><i class="bi bi-pc-display"></i><span>Laboratórios</span></div>
        <div class="hcard"><i class="bi bi-building"></i><span>Auditórios</span></div>
        <div class="hcard"><i class="bi bi-people"></i><span>Salas de Reunião</span></div>
      </div>
    </div>

    <div class="split-right">
      <div class="login-box">
        <h2>Entrar</h2>
        <p class="login-sub">Acesse com suas credenciais institucionais</p>

        <div class="form-group">
          <label>Usuário</label>
          <input type="text" id="usuario" placeholder="Ex: joao"/>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="senha" placeholder="••••••••"/>
        </div>

        <button class="btn-login" onclick="fazerLogin()">Entrar</button>
        <div id="msg-login" class="msg-erro hidden"></div>

        <!---- <div class="login-hint">
          <strong>Alunos:</strong> senha <code>aluno123</code><br/>
          <strong>Admin:</strong> usuário <code>admin</code> / senha <code>admin123</code>
        </div> -->
        
      </div>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000";

    async function fazerLogin() {
      const usuario = document.getElementById("usuario").value.trim();
      const senha = document.getElementById("senha").value;
      const msg = document.getElementById("msg-login");

      if (!usuario || !senha) {
        msg.textContent = "Preencha todos os campos";
        msg.classList.remove("hidden");
        return;
      }

      try {
        const res = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ usuario, senha }),
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("usuario", data.usuario);
          localStorage.setItem("nome", data.nome);
          localStorage.setItem("perfil", data.perfil);
          window.location.href = data.perfil === "admin" ? "admin.html" : "professor.html";
        } else {
          msg.textContent = data.detail;
          msg.classList.remove("hidden");
        }
      } catch {
        msg.textContent = "Erro de conexão com o servidor.";
        msg.classList.remove("hidden");
      }
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") fazerLogin(); });
  </script>
</body>
</html>
